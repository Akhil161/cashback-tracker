    <rect x="276" y="458" width="72" height="46" rx="7" fill="#A0832E"/>
    <!-- Contactless waves -->
    <path d="M376 450 Q408 484 376 518" fill="none" stroke="#A5D6A7" stroke-width="8" stroke-linecap="round" opacity="0.55"/>
    <path d="M356 432 Q408 484 356 536" fill="none" stroke="#A5D6A7" stroke-width="8" stroke-linecap="round" opacity="0.35"/>
    <!-- Card dots -->
