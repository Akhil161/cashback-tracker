    <circle cx="612" cy="562" r="12" fill="#A5D6A7" opacity="0.3"/>
    <circle cx="646" cy="562" r="12" fill="#A5D6A7" opacity="0.3"/>
    <circle cx="680" cy="562" r="12" fill="#A5D6A7" opacity="0.3"/>
